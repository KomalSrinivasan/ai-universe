site_name: AI Universe
site_description: The most comprehensive collection of AI tools, frameworks, and resources for developers
site_author: Komal Vardhan Lolugu
site_url: https://komalsrinivasan.github.io/ai-universe/

repo_name: KomalSrinivasan/ai-universe
repo_url: https://github.com/KomalSrinivasan/ai-universe
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Komal Vardhan Lolugu

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - announce.dismiss
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    default: latest

  social:
    - icon: fontawesome/solid/globe
      link: https://komal.workiq.in/
      name: Portfolio
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/komalvardhanlolugu/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/komalSrinivasan
      name: GitHub
    - icon: fontawesome/brands/medium
      link: https://komalvardhan.medium.com/
      name: Medium
    - icon: fontawesome/solid/calendar-check
      link: https://topmate.io/komal_vardhan_lolugu
      name: Book a Session on Topmate

  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback! Help us improve by using our feedback form.

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

nav:
  - Home: index.md
  - Getting Started:
    - Overview: guides/getting-started.md
    - Quick Reference: guides/quick-reference.md
    - Best Practices: guides/best-practices.md

  - Core Infrastructure:
    - Foundation Models: categories/foundation-models.md
    - Infrastructure: categories/infrastructure.md
    - Agents & Orchestration: categories/agents-orchestration.md

  - Development Tools:
    - Developer Tools: categories/developer-tools.md
    - Skills & Extensions: categories/skills-extensions.md
    - MCP Servers: categories/mcp-servers.md

  - Data & Observability:
    - Vector Databases: categories/vector-databases.md
    - Observability & Monitoring: categories/observability-monitoring.md
    - Datasets & Data Tools: categories/datasets-data-tools.md

  - Production & Deployment:
    - Deployment & Serving: categories/deployment-serving.md
    - Production AI: categories/production-ai.md
    - Evaluation & Testing: categories/evaluation-testing.md

  - Specialized Tools:
    - RAG & Knowledge: categories/rag-knowledge.md
    - Prompt Engineering: categories/prompt-engineering.md
    - AI Safety & Alignment: categories/ai-safety-alignment.md
    - Emerging & Research: categories/emerging-research.md

  - Community:
    - Contributors: contributors.md
    - Contributing Guide: CONTRIBUTING.md
    - License: LICENSE.md
