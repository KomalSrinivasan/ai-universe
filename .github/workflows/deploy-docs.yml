name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git revision dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat VERSION)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Build documentation
        run: |
          mkdocs build --clean --verbose
        env:
          ENABLE_PDF_EXPORT: 0
          PYTHONWARNINGS: ignore

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy v${{ steps.get_version.outputs.VERSION }} [skip ci]'
          enable_jekyll: false
          cname: ${{ secrets.CNAME }}

  create_release:
    needs: deploy
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## AI Universe Documentation Release ${{ github.ref_name }}

            ### What's New
            - Updated documentation
            - Latest AI tools and frameworks
            - Improved navigation and search

            ### Documentation
            🔗 [View Live Documentation](https://komalsrinivasan.github.io/ai-universe/)

            ### Installation
            ```bash
            git clone https://github.com/KomalSrinivasan/ai-universe.git
            cd ai-universe
            pip install -r requirements.txt
            mkdocs serve
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
